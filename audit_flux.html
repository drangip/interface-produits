<script>
(function(){
  var COOP_U_PAGES=['local_magasinsU.html'];
  var cur=location.pathname.split('/').pop()||'home.html';
  var isCU=COOP_U_PAGES.indexOf(cur)>=0;
  var saved=localStorage.getItem('annonceur');
  if(!saved){saved=isCU?'coop-u':'kingfisher';localStorage.setItem('annonceur',saved);}

  function applyFilter(v){
    var nav=document.querySelector('nav');
    if(!nav)return;
    var links=nav.querySelectorAll('a[href]');
    links.forEach(function(a){
      var href=a.getAttribute('href')||'';
      var isU=COOP_U_PAGES.indexOf(href)>=0;
      a.style.display=(v==='coop-u'?isU:!isU)?'':'none';
    });
    var sel=document.getElementById('annonceurSelect');
    if(sel)sel.value=v;
  }

  if(saved==='coop-u'&&!isCU){location.replace('local_magasinsU.html');return;}
  if(saved==='kingfisher'&&isCU){location.replace('home.html');return;}
  applyFilter(saved);

  window.switchAnnonceur=function(v){
    localStorage.setItem('annonceur',v);
    location.href=v==='coop-u'?'local_magasinsU.html':'home.html';
  };
})();
</script>

<script type="text/babel">
const {useState,useEffect,useMemo}=React;
const {
  RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis,
  BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,Cell,
  PieChart,Pie,AreaChart,Area,ResponsiveContainer,Legend
}=Recharts;

function seededRand(seed){let s=seed;return()=>{s=(s*16807+0)%2147483647;return(s-1)/2147483646;};}

function inText(val,text){
  if(!val||!text)return false;
  return text.toLowerCase().includes(String(val).toLowerCase());
}

function bucketLengths(arr,size){
  if(!arr.length)return[];
  const max=Math.max(...arr);
  const n=Math.ceil((max+1)/size);
  const b=Array.from({length:n},(_,i)=>({range:`${i*size+1}-${(i+1)*size}`,count:0}));
  arr.forEach(l=>{const i=Math.floor(l/size);if(b[i])b[i].count++;});
  return b.filter(x=>x.count>0);
}

/* ── ATTRIBUTE CARD ── */
function AttrCard({title,top5,missing,uniqueCount,total}){
  const isEmpty=!top5||top5.length===0;
  const missingPct=isEmpty?0:(Math.round(missing/total*10000)/100);
  return(
    <div className="card">
      <div className="ct">[{title}]</div>
      {isEmpty
        ?<div className="attr-empty">vide</div>
        :<ResponsiveContainer width="100%" height={100}>
          <BarChart data={top5} layout="vertical" margin={{top:0,right:0,left:0,bottom:0}} barCategoryGap="20%">
            <XAxis type="number" hide/>
            <YAxis dataKey="name" type="category" tick={{fontSize:8,fill:'#94A3B8'}} tickLine={false} axisLine={false} width={65}/>
            <Tooltip content={({active,payload})=>!active||!payload?.length?null:<div className="ctt">{payload[0].payload.name} : <b>{payload[0].value}</b></div>}/>
            <Bar dataKey="count" fill="#3B82F6" radius={[0,2,2,0]} opacity={.8}/>
          </BarChart>
        </ResponsiveContainer>}
      {isEmpty
        ?<div className="stat-note">• Aucune valeur</div>
        :<div className="stat-note">
          <div>• <b>{uniqueCount}</b> valeur{uniqueCount>1?'s':''} différente{uniqueCount>1?'s':''}</div>
          <div>• <b>{missing} ({missingPct}%)</b> valeur{missing>1?'s':''} manquante{missing>1?'s':''}</div>
        </div>}
    </div>
  );
}

function prodStatus(prods){const t=prods.length,a=prods.filter(p=>p.availability==='in_stock').length,r=prods.filter(p=>p.availability==='out_of_stock').length;return{total:t,active:a,refused:r,pctA:t>0?Math.round(a/t*100):0,pctR:t>0?Math.round(r/t*100):0};}
function genEvo(n=14){const r=seededRand(77);return Array.from({length:n},(_,i)=>({day:i+1,v:Math.round(88+r()*6)}));}

/* ── APP ── */
function App(){
  const [prods,setProds]=useState(null);
  useEffect(()=>{fetch('./data/products.json').then(r=>r.json()).then(setProds).catch(()=>setProds([]));},[]);

  const S=useMemo(()=>{
    if(!prods||!prods.length)return null;
    const n=prods.length;

    // Title
    const tLens=prods.map(p=>p.title.length);
    const tHist=bucketLengths(tLens,10);
    const tAvg=Math.round(tLens.reduce((a,b)=>a+b,0)/n);
    const tMin=Math.min(...tLens),tMax=Math.max(...tLens);

    // Description
    const dLens=prods.map(p=>(p.description||'').length);
    const dHist=bucketLengths(dLens,40);
    const dAvg=Math.round(dLens.reduce((a,b)=>a+b,0)/n);

    // CTR by title length
    const tGroups=[{min:0,max:25,l:'< 25 car.'},{min:25,max:40,l:'25-40 car.'},{min:40,max:55,l:'40-55 car.'},{min:55,max:70,l:'55-70 car.'},{min:70,max:999,l:'> 70 car.'}];
    const ctrByTitle=tGroups.map(g=>{const grp=prods.filter(p=>p.title.length>=g.min&&p.title.length<g.max);return{range:g.l,ctr:grp.length?Math.round(grp.reduce((s,p)=>s+(p.stats.ctr||0),0)/grp.length*10)/10:0};}).filter(x=>x.ctr>0);

    // CTR by desc length
    const dGroups=[{min:0,max:100,l:'< 100 car.'},{min:100,max:160,l:'100-160 car.'},{min:160,max:220,l:'160-220 car.'},{min:220,max:280,l:'220-280 car.'},{min:280,max:9999,l:'> 280 car.'}];
    const ctrByDesc=dGroups.map(g=>{const grp=prods.filter(p=>(p.description||'').length>=g.min&&(p.description||'').length<g.max);return{range:g.l,ctr:grp.length?Math.round(grp.reduce((s,p)=>s+(p.stats.ctr||0),0)/grp.length*10)/10:0};}).filter(x=>x.ctr>0);

    // Feature presence in title / description
    const fields=[{k:'brand',l:'Marque'},{k:'color',l:'Couleur'},{k:'size',l:'Taille'},{k:'material',l:'Matière'},{k:'gender',l:'Genre'}];
    const tFeats=fields.map(f=>({name:f.l,pct:prods.filter(p=>inText(p[f.k],p.title)).length/n*100}));
    const dFeats=fields.map(f=>({name:f.l,pct:prods.filter(p=>inText(p[f.k],p.description)).length/n*100}));

    // Categories
    const cats=[...new Set(prods.map(p=>p.category))].sort();
    const catCounts=cats.map(c=>({name:c,count:prods.filter(p=>p.category===c).length})).sort((a,b)=>b.count-a.count);

    // Hierarchy depth distribution (simulated, seeded)
    const rHier=seededRand(55);
    const hierDist=[{level:'2 niveaux',count:6},{level:'3 niveaux',count:17},{level:'4 niveaux',count:47},{level:'5 niveaux',count:22},{level:'6 niveaux',count:8}];

    // CL distributions
    const pct=(obj,k,tot)=>Math.round((obj[k]||0)/tot*100);
    const cl0=prods.reduce((a,p)=>{const k=p.cl0||'null';a[k]=(a[k]||0)+1;return a},{});
    const cl1=prods.reduce((a,p)=>{const k=p.cl1||'null';a[k]=(a[k]||0)+1;return a},{});
    const cl2=prods.reduce((a,p)=>{const k=String(p.cl2||'null');a[k]=(a[k]||0)+1;return a},{});
    const rCL4=seededRand(77);
    const cl4Shopping=Math.round(n*0.22);

    const cl0Rows=[{label:'push',color:'#22C55E',pct:pct(cl0,'push',n)},{label:'mid',color:'#3B82F6',pct:pct(cl0,'mid',n)},{label:'low',color:'#F59E0B',pct:pct(cl0,'low',n)},{label:'zombie',color:'#EF4444',pct:pct(cl0,'zombie',n)}];
    const cl1Rows=[{label:'promo',color:'#F97316',pct:pct(cl1,'promo',n)},{label:'null',color:'#94A3B8',pct:pct(cl1,'null',n)}];
    const cl2Rows=['1','2','3','4','5'].map((v,i)=>({label:`Niveau ${v}`,color:['#0EA5E9','#38BDF8','#7DD3FC','#BAE6FD','#93C5FD'][i],pct:pct(cl2,v,n)}));
    const cl3Rows=catCounts.slice(0,5).map((c,i)=>({label:c.name,color:['#6366F1','#818CF8','#A5B4FC','#C7D2FE','#E0E7FF'][i],pct:Math.round(c.count/n*100)}));
    const cl4Rows=[{label:'shopping_ads',color:'#EC4899',pct:Math.round(cl4Shopping/n*100)},{label:'null',color:'#94A3B8',pct:Math.round((n-cl4Shopping)/n*100)}];

    // Attributes
    function attrTop(key){
      const m=prods.reduce((a,p)=>{if(p[key]){a[p[key]]=(a[p[key]]||0)+1;}return a},{});
      return Object.entries(m).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
    }
    const colors=attrTop('color'),sizes=attrTop('size'),mats=attrTop('material'),genders=attrTop('gender');
    const colorMiss=prods.filter(p=>!p.color).length;
    const sizeMiss=prods.filter(p=>!p.size).length;
    const matMiss=prods.filter(p=>!p.material).length;
    const genMiss=prods.filter(p=>!p.gender).length;

    // Radar scores
    const couv=Math.round(prods.filter(p=>p.title&&p.description&&p.brand&&p.category).length/n*100);
    const titQ=Math.min(100,Math.round(tAvg/60*100));
    const ptQ=Math.round(prods.filter(p=>p.category).length/n*100);
    const etQ=Math.round((pct(cl0,'push',n)+pct(cl0,'mid',n))*0.8+pct(cl1,'promo',n)*0.2);
    const caQ=Math.round([(colors.length>0?100:0),(sizes.length>0?100:0),(mats.length>0?100:0)].reduce((a,b)=>a+b)/3);
    const radar=[{s:'Couverture',v:couv},{s:'Titre',v:titQ},{s:'Product type',v:ptQ},{s:'Étiquettes',v:Math.min(100,etQ)},{s:'Caractéristiques',v:caQ}];
    const noteE=Math.round([couv,titQ,ptQ,etQ,caQ].reduce((a,b)=>a+b)/5/10*2)/2;
    const noteP=Math.round([titQ,etQ].reduce((a,b)=>a+b)/2/10*2)/2;

    return{n,tHist,tAvg,tMin,tMax,dHist,dAvg,ctrByTitle,ctrByDesc,tFeats,dFeats,catCounts,hierDist,cl0Rows,cl1Rows,cl2Rows,cl3Rows,cl4Rows,colors,sizes,mats,genders,colorMiss,sizeMiss,matMiss,genMiss,radar,noteE,noteP};
  },[prods]);

  if(!prods||!S)return(<div className="loading"><div className="spin"/><span>Chargement…</span></div>);
  const {n}=S;
  const status=prodStatus(prods);
  const evo=genEvo();

  return(<>
    <div className="content">

      {/* ── DIAGNOSTIQUE + KPI ── */}
      <div className="sec" style={{marginBottom:16}}>
        <div className="stit">Diagnostique produit</div>
        <div style={{display:'flex',gap:12,alignItems:'stretch'}}>
          <ScoreCard label="Note Ensemble" value={S.noteE} color="#3B82F6"/>
          <div className="card" style={{width:250,flexShrink:0}}>
            <div className="ct">Score par dimension (/100)</div>
            <ResponsiveContainer width="100%" height={160}>
              <RadarChart data={S.radar} cx="50%" cy="50%" outerRadius={58}>
                <PolarGrid stroke="#E5E7EB"/>
                <PolarAngleAxis dataKey="s" tick={{fontSize:9,fill:'var(--t2)',fontFamily:'inherit'}}/>
                <PolarRadiusAxis domain={[0,100]} tick={false} axisLine={false}/>
                <Radar dataKey="v" stroke="#006AB3" fill="#006AB3" fillOpacity={.2} strokeWidth={2}
                  dot={{r:3,fill:'#006AB3',strokeWidth:0}}/>
                <Tooltip content={({active,payload})=>!active||!payload?.length?null:<div className="ctt"><div className="ttl">{payload[0].payload.s}</div><b>{payload[0].value}/100</b></div>}/>
              </RadarChart>
            </ResponsiveContainer>
          </div>
          <div style={{width:1,background:'var(--border)',flexShrink:0,alignSelf:'stretch'}}/>
          <div className="card" style={{minWidth:120,display:'flex',flexDirection:'column',justifyContent:'center'}}>
            <div className="ct">Produits actifs</div>
            <div className="bn" style={{color:'var(--primary)'}}>{status.pctA}%</div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}><span className="dlt pos">+0.8pp vs hier</span></div>
            <div className="bns">{nFmt(status.active)} produits</div>
          </div>
          <div className="card" style={{minWidth:120,display:'flex',flexDirection:'column',justifyContent:'center'}}>
            <div className="ct">Produits refusés</div>
            <div className="bn" style={{color:'var(--orange)'}}>{status.pctR}%</div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}><span className="dlt neg">-0.5pp vs hier</span></div>
            <div className="bns">{nFmt(status.refused)} produits</div>
          </div>
          <div className="card" style={{flex:1}}>
            <div className="ct">Évolution des produits actifs (14 jours)</div>
            <ResponsiveContainer width="100%" height={110}>
              <AreaChart data={evo} margin={{top:2,right:0,left:0,bottom:0}}>
                <defs>
                  <linearGradient id="evoGradAudit" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor="var(--primary)" stopOpacity={0.3}/>
                    <stop offset="95%" stopColor="var(--primary)" stopOpacity={0.02}/>
                  </linearGradient>
                </defs>
                <XAxis dataKey="day" hide/><YAxis domain={[80,100]} hide/>
                <Tooltip content={({active,payload})=>active&&payload?.length?<div className="ctt">J-{14-payload[0].payload.day} : <b>{payload[0].value}%</b></div>:null}/>
                <Area type="monotone" dataKey="v" stroke="var(--primary)" strokeWidth={2} fill="url(#evoGradAudit)" dot={false}/>
              </AreaChart>
            </ResponsiveContainer>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--t3)',marginTop:2}}><span>J-14</span><span>Aujourd'hui</span></div>
          </div>
        </div>
      </div>

      {/* ── TITRE ── */}
      <div className="sec">
        <div className="stit">Titre</div>
        <div className="g2" style={{marginBottom:14}}>
          <div className="card">
            <div className="ct">Distribution du nombre de caractères par titres</div>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:6}}>Moyenne : <b style={{color:'var(--t1)'}}>{S.tAvg} car.</b> &nbsp;•&nbsp; Min : <b style={{color:'var(--t1)'}}>{S.tMin}</b> &nbsp;•&nbsp; Max : <b style={{color:'var(--t1)'}}>{S.tMax}</b></div>
            <Histo data={S.tHist} color="#3B82F6"/>
          </div>
          <div className="card">
            <div className="ct">CTR moyen selon la longueur des titres</div>
            <CTRByLen data={S.ctrByTitle} color="#14B8A6"/>
          </div>
        </div>
        <div className="g2">
          <div className="card"><DoublonPie pctDup={4}/></div>
          <div className="card">
            <div className="ct">Présence des caractéristiques dans le titre</div>
            <FeatBars items={S.tFeats}/>
          </div>
        </div>
      </div>

      {/* ── DESCRIPTION ── */}
      <div className="sec">
        <div className="stit">Description</div>
        <div className="g2" style={{marginBottom:14}}>
          <div className="card">
            <div className="ct">Distribution du nombre de caractères par descriptions</div>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:6}}>Moyenne : <b style={{color:'var(--t1)'}}>{S.dAvg} car.</b></div>
            <Histo data={S.dHist} color="#8B5CF6"/>
          </div>
          <div className="card">
            <div className="ct">CTR moyen selon la longueur des descriptions</div>
            <CTRByLen data={S.ctrByDesc} color="#EC4899"/>
          </div>
        </div>
        <div className="g2">
          <div className="card"><DoublonPie pctDup={6}/></div>
          <div className="card">
            <div className="ct">Présence des caractéristiques dans la description</div>
            <FeatBars items={S.dFeats}/>
          </div>
        </div>
      </div>

      {/* ── PRODUCT TYPE ── */}
      <div className="sec">
        <div className="stit">Product Type</div>
        <div className="g2" style={{marginBottom:14}}>
          <div className="card">
            <div className="ct">Répartition des produits par catégorie</div>
            <ResponsiveContainer width="100%" height={240}>
              <BarChart data={S.catCounts} layout="vertical" margin={{top:4,right:36,left:0,bottom:0}} barCategoryGap="20%">
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" horizontal={false}/>
                <XAxis type="number" tick={{fontSize:9,fill:'#94A3B8'}} tickLine={false} axisLine={false}/>
                <YAxis dataKey="name" type="category" tick={{fontSize:9,fill:'#94A3B8'}} tickLine={false} axisLine={false} width={150}/>
                <Tooltip content={({active,payload})=>!active||!payload?.length?null:<div className="ctt"><div className="ttl">{payload[0].payload.name}</div><b>{payload[0].value} produits</b></div>}/>
                <Bar dataKey="count" fill="#006AB3" radius={[0,2,2,0]} opacity={.85} label={{position:'right',fontSize:9,fill:'var(--t2)'}}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="card">
            <div className="ct">Profondeur de la hiérarchie (product_type)</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:'5px 10px',alignItems:'center',marginBottom:14,fontSize:12}}>
              {[['Nb moyen de niveaux','4'],['Nb médian de niveaux','4'],['Nb minimum de niveaux','2'],['Nb maximum de niveaux','6']].map(([l,v])=>(
                <React.Fragment key={l}>
                  <span style={{color:'var(--t2)'}}>{l}</span>
                  <span style={{background:'#EEF2FF',color:'#6366F1',fontWeight:700,padding:'2px 10px',borderRadius:4,textAlign:'center'}}>{v}</span>
                </React.Fragment>
              ))}
            </div>
            <ResponsiveContainer width="100%" height={130}>
              <BarChart data={S.hierDist} margin={{top:4,right:8,left:0,bottom:0}} barCategoryGap="25%">
                <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" vertical={false}/>
                <XAxis dataKey="level" tick={{fontSize:8,fill:'#94A3B8'}} tickLine={false} axisLine={false}/>
                <YAxis tick={{fontSize:9,fill:'#94A3B8'}} tickLine={false} axisLine={false} width={24}/>
                <Tooltip content={({active,payload})=>!active||!payload?.length?null:<div className="ctt"><div className="ttl">{payload[0].payload.level}</div><b>{payload[0].value} produits</b></div>}/>
                <Bar dataKey="count" fill="#6366F1" radius={[2,2,0,0]} opacity={.85}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
        <div className="stit" style={{marginTop:24}}>Custom Labels</div>
        <div className="g5">
          <CLCard label="custom_label_0" badge="Performance" badgeColor="#8B5CF6" desc="Labélisation du niveau de performance produit (push, mid, low, zombie)" rows={S.cl0Rows}/>
          <CLCard label="custom_label_1" badge="Promotionnel" badgeColor="#F97316" desc="Statut promotionnel du produit (promo ou non)" rows={S.cl1Rows}/>
          <CLCard label="custom_label_2" badge="Catégorie" badgeColor="#14B8A6" desc="Niveau de catégorie produit de 1 à 5" rows={S.cl2Rows}/>
          <CLCard label="custom_label_3" badge="Famille" badgeColor="#6366F1" desc="Famille de produits — basée sur la catégorie principale" rows={S.cl3Rows}/>
          <CLCard label="custom_label_4" badge="Shopping" badgeColor="#EC4899" desc="Identification des produits éligibles Shopping Ads" rows={S.cl4Rows}/>
        </div>
      </div>

      {/* ── CARACTÉRISTIQUES ── */}
      <div className="sec">
        <div className="stit">Caractéristiques produits</div>
        <div className="g3" style={{marginBottom:14}}>
          <AttrCard title="Color" top5={S.colors.slice(0,5)} missing={S.colorMiss} uniqueCount={S.colors.length} total={n}/>
          <AttrCard title="Size" top5={S.sizes.slice(0,5)} missing={S.sizeMiss} uniqueCount={S.sizes.length} total={n}/>
          <AttrCard title="Material" top5={S.mats.slice(0,5)} missing={S.matMiss} uniqueCount={S.mats.length} total={n}/>
        </div>
        <div className="g3">
          <AttrCard title="Pattern" top5={[]} missing={0} uniqueCount={0} total={n}/>
          <AttrCard title="Age_group" top5={[]} missing={0} uniqueCount={0} total={n}/>
          <AttrCard title="Gender" top5={S.genders.slice(0,5)} missing={S.genMiss} uniqueCount={S.genders.length} total={n}/>
        </div>
      </div>

    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
