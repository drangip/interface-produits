<script>
(function(){
  var COOP_U_PAGES=['local_magasinsU.html'];
  var QUICK_PAGES=['local_quick.html'];
  var NORAUTO_PAGES=['local_norauto.html'];
  var cur=location.pathname.split('/').pop()||'home.html';
  var isCU=COOP_U_PAGES.indexOf(cur)>=0;
  var isQ=QUICK_PAGES.indexOf(cur)>=0;
  var isN=NORAUTO_PAGES.indexOf(cur)>=0;
  var saved=localStorage.getItem('annonceur');
  if(!saved){saved=isCU?'coop-u':isQ?'quick':isN?'norauto':'kingfisher';localStorage.setItem('annonceur',saved);}

  function applyFilter(v){
    var nav=document.querySelector('nav');
    if(!nav)return;
    var links=nav.querySelectorAll('a[href]');
    links.forEach(function(a){
      var href=a.getAttribute('href')||'';
      var isU=COOP_U_PAGES.indexOf(href)>=0;
      var isQLink=QUICK_PAGES.indexOf(href)>=0;
      var isNLink=NORAUTO_PAGES.indexOf(href)>=0;
      var show=v==='coop-u'?isU:v==='quick'?isQLink:v==='norauto'?isNLink:(!isU&&!isQLink&&!isNLink);
      a.style.display=show?'':'none';
    });
    var sel=document.getElementById('annonceurSelect');
    if(sel)sel.value=v;
  }

  if(saved==='coop-u'&&!isCU){location.replace('local_magasinsU.html');return;}
  if(saved==='quick'&&!isQ){location.replace('local_quick.html');return;}
  if(saved==='norauto'&&!isN){location.replace('local_norauto.html');return;}
  if(saved==='kingfisher'&&(isCU||isQ||isN)){location.replace('home.html');return;}
  applyFilter(saved);

  window.switchAnnonceur=function(v){
    localStorage.setItem('annonceur',v);
    if(v==='coop-u')location.href='local_magasinsU.html';
    else if(v==='quick')location.href='local_quick.html';
    else if(v==='norauto')location.href='local_norauto.html';
    else location.href='home.html';
  };
})();
</script>

function seededRand(seed){let s=seed;return()=>{s=(s*16807+0)%2147483647;return(s-1)/2147483646;};}
const nf=v=>new Intl.NumberFormat('fr-FR').format(Math.round(v||0));
const avg=a=>+(a.reduce((s,v)=>s+v,0)/a.length).toFixed(1);
const delta=(last,ref)=>+((last-ref)/ref*100).toFixed(1);
const RANK_COLORS=['#F59E0B','#F97316','#22C55E','#8B5CF6','#EF4444'];

function chartSVG(data,gid){
  const W=220,H=88,pL=26,pR=4,pT=6,pB=16;
  const iw=W-pL-pR,ih=H-pT-pB;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const av=data.reduce((a,b)=>a+b,0)/data.length;
  const x=i=>pL+i/(data.length-1)*iw;
  const y=v=>pT+(1-(v-mn)/rng)*ih;
  const pts=data.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const ya=y(av);
  const ap=`M${x(0).toFixed(1)},${y(data[0]).toFixed(1)} `+data.slice(1).map((v,i)=>`L${x(i+1).toFixed(1)},${y(v).toFixed(1)}`).join(' ')+` L${x(21).toFixed(1)},${(pT+ih).toFixed(1)} L${pL},${(pT+ih).toFixed(1)} Z`;
  const xlbls=[{i:0,t:'Déc'},{i:4,t:'Jan'},{i:8,t:'Fév'},{i:12,t:'Mar'},{i:16,t:'Avr'},{i:21,t:'Mai'}];
  const ymax=pT+5,yavg=Math.max(pT+10,Math.min(ya,pT+ih-4));
  return`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E30613" stop-opacity=".25"/><stop offset="100%" stop-color="#E30613" stop-opacity=".01"/></linearGradient></defs>
    <path d="${ap}" fill="url(#${gid})"/>
    <polyline points="${pts}" fill="none" stroke="#E30613" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="${pL}" y1="${ya.toFixed(1)}" x2="${W-pR}" y2="${ya.toFixed(1)}" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,3" opacity=".85"/>
    <circle cx="${x(21).toFixed(1)}" cy="${y(data[21]).toFixed(1)}" r="4" fill="#F59E0B" stroke="white" stroke-width="1.5"/>
    <text x="${pL-2}" y="${ymax}" text-anchor="end" font-size="7.5" fill="#9CA3AF">${Math.round(mx)}</text>
    <text x="${pL-2}" y="${(yavg+3).toFixed(1)}" text-anchor="end" font-size="7.5" fill="#9CA3AF">${Math.round(av)}</text>
    <text x="${pL-2}" y="${(pT+ih+2).toFixed(1)}" text-anchor="end" font-size="7.5" fill="#9CA3AF">${Math.round(mn)}</text>
    ${xlbls.map(l=>`<text x="${x(l.i).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="7.5" fill="#9CA3AF">${l.t}</text>`).join('')}
  </svg>`;}

function getStoreData(idx){
  const rBase=seededRand(idx*17+3);
  const vBase=Math.round(280+rBase()*320);
  const cBase=Math.round(65+rBase()*115);
  const iBase=Math.round(28+rBase()*52);
  const rv=seededRand(idx*31+7),rc=seededRand(idx*31+107),ri=seededRand(idx*31+207);
  const visits=Array.from({length:22},()=>Math.round(vBase*(0.72+rv()*0.56)));
  const calls=Array.from({length:22},()=>Math.round(cBase*(0.72+rc()*0.56)));
  const routes=Array.from({length:22},()=>Math.round(iBase*(0.72+ri()*0.56)));
  const avgV=avg(visits),avgC=avg(calls),avgR=avg(routes);
  const lastV=visits[21],prevV=visits[20],lastC=calls[21],prevC=calls[20],lastR=routes[21],prevR=routes[20];
  return{visits,calls,routes,lastV,prevV,avgV,vsMoyV:delta(lastV,avgV),vsPrevV:delta(lastV,prevV),
    lastC,prevC,avgC,vsMoyC:delta(lastC,avgC),vsPrevC:delta(lastC,prevC),
    lastR,prevR,avgR,vsMoyR:delta(lastR,avgR),vsPrevR:delta(lastR,prevR)};}

const allStores=stores.map((s,i)=>({...getStoreData(i),s,idx:i}));
const byVisits=[...allStores].sort((a,b)=>b.lastV-a.lastV);
const byProg=[...allStores].sort((a,b)=>b.vsPrevV-a.vsPrevV);

const WEEK_DATES=(()=>{
  const ms=['jan','fév','mar','avr','mai','jun'];
  const start=new Date(2025,11,29);
  return Array.from({length:22},(_,i)=>{const d=new Date(start);d.setDate(d.getDate()+i*7);return`${d.getDate()} ${ms[d.getMonth()]||'?'}`;});
})();

function setupEvoChart(top5){
  const canvas=document.getElementById('evo-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const pL=34,pR=8,pT=10,pB=26;
  const iw=W-pL-pR,ih=H-pT-pB;
  const allVals=top5.flatMap(t=>t.visits);
  const maxV=Math.ceil(Math.max(...allVals)*1.08/50)*50;
  const x=i=>pL+i/21*iw;
  const y=v=>pT+(1-v/maxV)*ih;

  function draw(hw){
    ctx.clearRect(0,0,W,H);
    [0,.25,.5,.75,1].forEach(t=>{
      const val=Math.round(maxV*t);
      const yv=y(val);
      ctx.strokeStyle='#E9ECF0';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(pL,yv);ctx.lineTo(W-pR,yv);ctx.stroke();
      ctx.fillStyle='#9CA3AF';ctx.font='9px -apple-system,Arial,sans-serif';
      ctx.textAlign='right';ctx.fillText(val,pL-4,yv+3.5);
    });
    [{i:0,t:'29 déc'},{i:4,t:'26 jan'},{i:8,t:'23 fév'},{i:12,t:'23 mar'},{i:16,t:'20 avr'},{i:21,t:'25 mai'}].forEach(({i,t})=>{
      ctx.fillStyle='#9CA3AF';ctx.font='8.5px -apple-system,Arial,sans-serif';
      ctx.textAlign='center';ctx.fillText(t,x(i),H-4);
    });
    if(hw!==null){
      ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=1;
      ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(x(hw),pT);ctx.lineTo(x(hw),pT+ih);ctx.stroke();
      ctx.setLineDash([]);
    }
    top5.forEach((t,ci)=>{
      const col=RANK_COLORS[ci];
      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin='round';
      ctx.beginPath();
      t.visits.forEach((v,i)=>{if(i===0)ctx.moveTo(x(i),y(v));else ctx.lineTo(x(i),y(v));});
      ctx.stroke();
      if(hw!==null){
        ctx.fillStyle=col;ctx.beginPath();ctx.arc(x(hw),y(t.visits[hw]),4.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x(hw),y(t.visits[hw]),2,0,Math.PI*2);ctx.fill();
      }
    });
  }
  draw(null);

  let tip=document.getElementById('evo-tip');
  if(!tip){tip=document.createElement('div');tip.id='evo-tip';
    tip.style.cssText='position:fixed;display:none;background:rgba(15,27,53,.92);color:#fff;border-radius:8px;padding:8px 11px;font-size:9.5px;pointer-events:none;z-index:9999;min-width:145px;box-shadow:0 4px 14px rgba(0,0,0,.35);line-height:1.7';
    document.body.appendChild(tip);}

  canvas.addEventListener('mousemove',e=>{
    const rect=canvas.getBoundingClientRect();
    const rawX=(e.clientX-rect.left)*W/rect.width;
    const wi=Math.max(0,Math.min(21,Math.round((rawX-pL)/iw*21)));
    draw(wi);
    let h=`<div style="font-weight:700;font-size:10px;border-bottom:1px solid rgba(255,255,255,.2);padding-bottom:3px;margin-bottom:4px">${WEEK_DATES[wi]}</div>`;
    top5.forEach((t,ci)=>{
      const name=t.s.n.replace('Brico Dépôt ','');
      h+=`<div style="display:flex;justify-content:space-between;gap:10px"><span><span style="color:${RANK_COLORS[ci]}">●</span> ${name}</span><span style="font-weight:700">${nf(t.visits[wi])}</span></div>`;
    });
    tip.innerHTML=h;tip.style.display='block';
    const tx=e.clientX+14,ty=e.clientY-20;
    tip.style.left=(tx+tip.offsetWidth>window.innerWidth?tx-tip.offsetWidth-28:tx)+'px';
    tip.style.top=ty+'px';
  });
  canvas.addEventListener('mouseleave',()=>{draw(null);tip.style.display='none';});
}

      <td style="padding:7px 8px;text-align:center"><span style="background:${vmS?'#DCFCE7':'#FEE2E2'};color:${vmS?'#15803D':'#DC2626'};font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px">${vmS?'+':''}${t.vsMoyV.toFixed(1)} %</span></td>
    </tr>`;}

  document.getElementById('panel-content').innerHTML=`
    <div id="store-section" style="display:flex;flex-direction:column;gap:8px;padding-bottom:8px">
    <div style="background:#0D1B4B;color:#fff;padding:9px 14px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:8px">
      <div style="width:3px;height:14px;background:#E30613;border-radius:2px"></div>
      Performance par magasin
    </div>
    <div class="lhdr">
      <div class="lhdr-left">
        <div class="lhdr-logo">${BD_LOGO}</div>
        <div>
          <div class="lhdr-name">${store.n}</div>
          <div class="lhdr-addr">📍 ${store.a} — ${store.cp} ${store.c}</div>
        </div>
      </div>
      <div class="lhdr-right">
        <div class="lhdr-badge">📅 29 déc. 2025 → 25 mai 2026</div>
        <div class="lhdr-meta">22 semaines · Mise à jour : 25 mai 2026</div>
        <div style="display:flex;gap:5px;justify-content:flex-end">
          <button class="lbtn lbtn-out" onclick="window.print()">🖨 Imprimer / PDF</button>
        </div>
      </div>
    </div>
    <div class="lsec"><div class="lsec-bar"></div>INDICATEURS — DERNIÈRE SEMAINE (25 MAI 2026)</div>
    <div class="lkpi-grid">
      ${kpiCard('🏠','VISITES EN MAGASIN',d.lastV,d.prevV,d.avgV,d.vsMoyV,d.vsPrevV)}
      ${kpiCard('📞','CLICS D\'APPEL',d.lastC,d.prevC,d.avgC,d.vsMoyC,d.vsPrevC)}
      ${kpiCard('🗺','DEMANDES D\'ITINÉRAIRE',d.lastR,d.prevR,d.avgR,d.vsMoyR,d.vsPrevR)}
    </div>
    <div class="lsec"><div class="lsec-bar"></div>ÉVOLUTION HEBDOMADAIRE — 22 SEMAINES</div>
    <div class="lchart-grid">
      ${chartCard('🏠','Visites en magasin',d.visits,'gv'+idx,d.lastV,d.avgV)}
      ${chartCard('📞','Clics d\'appel',d.calls,'gc'+idx,d.lastC,d.avgC)}
      ${chartCard('🗺','Demandes d\'itinéraire',d.routes,'gr'+idx,d.lastR,d.avgR)}

  document.getElementById('global-title').innerHTML=`
    <div style="background:#0D1B4B;color:#fff;padding:9px 14px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:8px">
      <div style="width:3px;height:14px;background:#E30613;border-radius:2px"></div>
      Performance globale des magasins
    </div>`;

  document.getElementById('global-row1').innerHTML=`
    <div style="flex:0 0 44%;display:flex;flex-direction:column;gap:8px">
      <div class="lsec"><div class="lsec-bar"></div>FAITS MARQUANTS — SEMAINE DU 25 MAI 2026</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${hCard('#F59E0B','🏆','PLUS DE VISITES',mostV,nf(mostV.lastV),'visites en magasin',`Sem. préc. : ${nf(mostV.prevV)} · Moy. : ${nf(mostV.avgV)}`)}
        ${hCard('#22C55E','🚀','MEILLEURE PROGRESSION',bestP,(bestP.vsPrevV>=0?'+':'')+bestP.vsPrevV.toFixed(1)+' %',`${nf(bestP.prevV)} → ${nf(bestP.lastV)} visites`,`Moy. ${nf(bestP.avgV)} · vs moy. ${bestP.vsMoyV>=0?'+':''}${bestP.vsMoyV.toFixed(1)} %`)}
        ${hCard('#F97316','👁','MOINS DE VISITES',leastV,nf(leastV.lastV),'visites en magasin',`Sem. préc. : ${nf(leastV.prevV)} · Moy. : ${nf(leastV.avgV)}`)}
        ${hCard('#EF4444','📉','PLUS BASSE PROGRESSION',worstP,(worstP.vsPrevV>=0?'+':'')+worstP.vsPrevV.toFixed(1)+' %',`${nf(worstP.prevV)} → ${nf(worstP.lastV)} visites`,`Moy. ${nf(worstP.avgV)} · vs moy. ${worstP.vsMoyV>=0?'+':''}${worstP.vsMoyV.toFixed(1)} %`)}
      </div>
    </div>
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:8px">
      <div class="lsec"><div class="lsec-bar"></div>CLASSEMENT DES VISITES — SEMAINE DU 25 MAI 2026</div>
      <div class="lchart-card" style="padding:4px 6px;flex:1">
        ${top5.map((t,i)=>rankRow(i+1,t,RANK_COLORS[i],i===0)).join('')}
      </div>
    </div>`;

  document.getElementById('global-row2').innerHTML=`
    <div style="flex:0 0 44%;display:flex;flex-direction:column;gap:8px">
      <div class="lsec"><div class="lsec-bar"></div>ÉVOLUTION HEBDOMADAIRE — 22 SEMAINES</div>
      <div class="lchart-card" style="padding:14px">
        <div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:1px">Visites en magasin — Top 5 magasins</div>
        <div style="font-size:8.5px;color:#9CA3AF;margin-bottom:8px">29 déc. 2025 → 25 mai 2026</div>
        <canvas id="evo-canvas" width="900" height="200" style="width:100%;height:auto;cursor:crosshair;display:block"></canvas>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px">
          ${top5.map((t,i)=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:9px;color:#6B7280"><svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke="${RANK_COLORS[i]}" stroke-width="2.5"/></svg>${shortN(t)} (${t.s.cp})</span>`).join('')}
        </div>
      </div>
    </div>
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:8px">
      <div class="lsec"><div class="lsec-bar"></div>TABLEAU RÉCAPITULATIF</div>
      <div class="lchart-card" style="padding:0;overflow:hidden">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:#E30613">
            <th style="padding:8px 10px;text-align:left;color:#fff;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em">Magasin</th>
            <th style="padding:8px;color:#fff;font-size:8.5px;font-weight:700;text-transform:uppercase;text-align:center">CP</th>
            <th style="padding:8px;color:#fff;font-size:8.5px;font-weight:700;text-transform:uppercase;text-align:right">Sem. 25 mai</th>
            <th style="padding:8px;color:#fff;font-size:8.5px;font-weight:700;text-transform:uppercase;text-align:right">Sem. 18 mai</th>
            <th style="padding:8px;color:#fff;font-size:8.5px;font-weight:700;text-transform:uppercase;text-align:center">Prog. S/S</th>
            <th style="padding:8px;color:#fff;font-size:8.5px;font-weight:700;text-transform:uppercase;text-align:right">Moy. 22 sem.</th>
            <th style="padding:8px;color:#fff;font-size:8.5px;font-weight:700;text-transform:uppercase;text-align:center">vs Moy.</th>
          </tr></thead>
          <tbody>${top5.map((t,i)=>tableRow(t,i)).join('')}</tbody>
        </table>
      </div>
    </div>`;

  setupEvoChart(top5);
  requestAnimationFrame(()=>{
    const el=document.getElementById('store-section');
    if(!el)return;
    const h=el.offsetHeight+14;
    document.getElementById('layout').style.height=h+'px';
    document.getElementById('map').style.height=h+'px';
    map.invalidateSize();
  });
}

const PIN=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="44" viewBox="0 0 40 54">
  <ellipse cx="20" cy="52" rx="7" ry="2.8" fill="rgba(0,0,0,0.22)"/>
  <path d="M20 2C10.06 2 2 10.06 2 20C2 33.8 20 52 20 52C20 52 38 33.8 38 20C38 10.06 29.94 2 20 2Z" fill="#E30613"/>
  <path d="M12 7C9 10.5 7.5 15 7.5 20" stroke="rgba(255,255,255,0.32)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="20" cy="20" r="13" fill="white"/>
  <rect x="8" y="13" width="24" height="14" rx="3" fill="#E30613"/>
  <rect x="8" y="18" width="24" height="9" rx="0" fill="#1A1A1A"/>
  <text x="20" y="21" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="5.5" font-weight="900" fill="#fff">BRICO</text>
  <text x="20" y="27.5" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="5" font-weight="900" fill="#E30613">DÉPÔT</text>
</svg>`;

const PIN_ACTIVE=`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="50" viewBox="0 0 40 54">
  <ellipse cx="20" cy="52" rx="8" ry="3" fill="rgba(0,0,0,0.3)"/>
  <path d="M20 2C10.06 2 2 10.06 2 20C2 33.8 20 52 20 52C20 52 38 33.8 38 20C38 10.06 29.94 2 20 2Z" fill="#1A1A1A"/>
  <circle cx="20" cy="20" r="13" fill="white"/>
  <rect x="8" y="13" width="24" height="14" rx="3" fill="#E30613"/>
  <rect x="8" y="18" width="24" height="9" rx="0" fill="#1A1A1A"/>
  <text x="20" y="21" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="5.5" font-weight="900" fill="#fff">BRICO</text>
  <text x="20" y="27.5" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="5" font-weight="900" fill="#E30613">DÉPÔT</text>
</svg>`;

const iconNormal=L.divIcon({html:`<div style="filter:drop-shadow(1px 2px 4px rgba(0,0,0,.4));cursor:pointer;transition:transform .15s;transform-origin:bottom center" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">${PIN}</div>`,iconSize:[32,44],iconAnchor:[16,44],className:''});
const iconActive=L.divIcon({html:`<div style="filter:drop-shadow(2px 3px 8px rgba(0,0,0,.5));cursor:pointer;transform-origin:bottom center">${PIN_ACTIVE}</div>`,iconSize:[36,50],iconAnchor:[18,50],className:''});

const map=L.map('map',{center:[46.6,2.35],zoom:6});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

const cluster=L.markerClusterGroup({
  maxClusterRadius:55,showCoverageOnHover:false,
  iconCreateFunction(c){const n=c.getChildCount(),sz=n<10?40:n<20?48:56;return L.divIcon({html:`<div class="bd-cluster" style="width:${sz+10}px;height:${sz+10}px"><div class="bd-cluster-inner" style="width:${sz}px;height:${sz}px;font-size:${sz<50?13:15}px">${n}</div></div>`,iconSize:[sz+10,sz+10],iconAnchor:[(sz+10)/2,(sz+10)/2],className:''});}
});

let activeMarker=null;
const markers=stores.map((s,idx)=>{
  const m=L.marker([s.lat,s.lng],{icon:iconNormal});
  m.on('click',()=>{
    if(activeMarker)activeMarker.setIcon(iconNormal);
    m.setIcon(iconActive);activeMarker=m;
    renderPanel(s,idx);
    map.setView([s.lat,s.lng],13,{animate:true,duration:0.8});
  });
  cluster.addLayer(m);return m;
});
map.addLayer(cluster);

const ResetCtrl=L.Control.extend({options:{position:'topright'},onAdd(){
  const btn=L.DomUtil.create('button');
  btn.title='Vue France entière';
  btn.style.cssText='background:#E30613;color:white;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.3);';
  btn.innerHTML='🇫🇷';
  btn.onclick=()=>{if(activeMarker){activeMarker.setIcon(iconNormal);activeMarker=null;}map.flyTo([46.6,2.35],6,{duration:1.2});};
  return btn;
}});
map.addControl(new ResetCtrl());

markers[0].setIcon(iconActive);activeMarker=markers[0];
renderPanel(stores[0],0);
map.setView([stores[0].lat,stores[0].lng],12);
</script>
</body>
</html>
