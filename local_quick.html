<script>
(function(){
  var COOP_U_PAGES=['local_magasinsU.html'];
  var QUICK_PAGES=['local_quick.html'];
  var cur=location.pathname.split('/').pop()||'home.html';
  var isCU=COOP_U_PAGES.indexOf(cur)>=0;
  var isQ=QUICK_PAGES.indexOf(cur)>=0;
  var saved=localStorage.getItem('annonceur');
  if(!saved){saved=isCU?'coop-u':isQ?'quick':'kingfisher';localStorage.setItem('annonceur',saved);}

  function applyFilter(v){
    var nav=document.querySelector('nav');
    if(!nav)return;
    var links=nav.querySelectorAll('a[href]');
    links.forEach(function(a){
      var href=a.getAttribute('href')||'';
      var isU=COOP_U_PAGES.indexOf(href)>=0;
      var isQLink=QUICK_PAGES.indexOf(href)>=0;
      var show=v==='coop-u'?isU:v==='quick'?isQLink:(!isU&&!isQLink);
      a.style.display=show?'':'none';
    });
    var sel=document.getElementById('annonceurSelect');
    if(sel)sel.value=v;
  }

  if(saved==='coop-u'&&!isCU){location.replace('local_magasinsU.html');return;}
  if(saved==='quick'&&!isQ){location.replace('local_quick.html');return;}
  if(saved==='kingfisher'&&(isCU||isQ)){location.replace('home.html');return;}
  applyFilter(saved);

  window.switchAnnonceur=function(v){
    localStorage.setItem('annonceur',v);
    if(v==='coop-u')location.href='local_magasinsU.html';
    else if(v==='quick')location.href='local_quick.html';
    else location.href='home.html';
  };
})();
</script>

// ── SPARKLINE SVG ──
function chartSVG(data,gid,color){
  color=color||BRAND;
  const W=220,H=88,pL=26,pR=4,pT=6,pB=16;
  const iw=W-pL-pR,ih=H-pT-pB;
  const n=data.length;
  if(n<2)return'<svg width="100%" height="'+H+'"></svg>';
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const av=data.reduce((a,b)=>a+b,0)/data.length;
  const x=i=>pL+i/(n-1)*iw;
  const y=v=>pT+(1-(v-mn)/rng)*ih;
  const pts=data.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const ya=y(av);
  const ap=`M${x(0).toFixed(1)},${y(data[0]).toFixed(1)} `+data.slice(1).map((v,i)=>`L${x(i+1).toFixed(1)},${y(v).toFixed(1)}`).join(' ')+` L${x(n-1).toFixed(1)},${(pT+ih).toFixed(1)} L${pL},${(pT+ih).toFixed(1)} Z`;
  const ymax=pT+5,yavg=Math.max(pT+10,Math.min(ya,pT+ih-4));
  return`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".25"/><stop offset="100%" stop-color="${color}" stop-opacity=".01"/></linearGradient></defs>
    <path d="${ap}" fill="url(#${gid})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="${pL}" y1="${ya.toFixed(1)}" x2="${W-pR}" y2="${ya.toFixed(1)}" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,3" opacity=".85"/>
    <circle cx="${x(n-1).toFixed(1)}" cy="${y(data[n-1]).toFixed(1)}" r="4" fill="#F59E0B" stroke="white" stroke-width="1.5"/>
    <text x="${pL-2}" y="${ymax}" text-anchor="end" font-size="7.5" fill="#9CA3AF">${Math.round(mx)}</text>
    <text x="${pL-2}" y="${(yavg+3).toFixed(1)}" text-anchor="end" font-size="7.5" fill="#9CA3AF">${Math.round(av)}</text>
    <text x="${pL-2}" y="${(pT+ih+2).toFixed(1)}" text-anchor="end" font-size="7.5" fill="#9CA3AF">${Math.round(mn)}</text>
  </svg>`;}

{n:"Burger King",cp:"6210",c:"Mandelieu",a:"Parc d'Act. l'Echangeur. All\u00e9e L Bl\u00e9riot",lat:50.4539,lng:2.5561,visits:[0,0,0,0],calls:[0,0,0,0],routes:[0,0,0,0],commandes:[0,0,0,0],lastV:0,prevV:0,avgV:0.0,lastC:0,prevC:0,avgC:0.0,lastR:0,prevR:0,avgR:0.0,lastCmd:0,prevCmd:0,avgCmd:0.0}
];

const allStores=stores.map((s,i)=>{
  const vsMoyV=delta(s.lastV,s.avgV);
  const vsPrevV=delta(s.lastV,s.prevV);
  const vsMoyC=delta(s.lastC,s.avgC);
  const vsMoyR=delta(s.lastR,s.avgR);
  const vsMoyCmd=delta(s.lastCmd,s.avgCmd);
  return{...s,idx:i,vsMoyV,vsPrevV,vsMoyC,vsMoyR,vsMoyCmd};
});
const byVisits=[...allStores].sort((a,b)=>b.lastV-a.lastV);
const byProg=[...allStores].sort((a,b)=>b.vsPrevV-a.vsPrevV);

// ── QUICK PIN SVG ──
function pinSVG(active){
  const fill=active?'#FFCC00':BRAND;
  const text=active?'Q':'Q';
  const textColor=active?'#0D1B4B':'#fff';
  return `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 24 14 24S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="${fill}" stroke="#fff" stroke-width="1.5"/>
    <text x="14" y="19" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="800" fill="${textColor}">Q</text>
  </svg>`;}

// ── MAP ──
const map=L.map('map',{zoomControl:true,attributionControl:false}).setView([46.8,2.3],6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);

const markers=L.markerClusterGroup({
  iconCreateFunction:function(cluster){
    const n=cluster.getChildCount();
    const sz=n<10?32:n<50?38:44;
    return L.divIcon({className:'',iconSize:[sz,sz],html:`<div class="q-cluster" style="width:${sz}px;height:${sz}px"><div class="q-cluster-inner" style="width:${sz-8}px;height:${sz-8}px;font-size:${sz>38?13:11}px">${n}</div></div>`});
  },maxClusterRadius:50
});

let activeMarker=null;
const markerMap={};

allStores.forEach(s=>{
  const icon=L.divIcon({className:'',iconSize:[28,38],iconAnchor:[14,38],html:pinSVG(false)});
  const m=L.marker([s.lat,s.lng],{icon});
  m.on('click',()=>selectStore(s.idx));
  markerMap[s.idx]=m;
  markers.addLayer(m);
});
map.addLayer(markers);

function setActiveMarker(idx){
  if(activeMarker!==null&&markerMap[activeMarker]){
    markerMap[activeMarker].setIcon(L.divIcon({className:'',iconSize:[28,38],iconAnchor:[14,38],html:pinSVG(false)}));
  }
  activeMarker=idx;
  if(markerMap[idx]){
    markerMap[idx].setIcon(L.divIcon({className:'',iconSize:[28,38],iconAnchor:[14,38],html:pinSVG(true)}));
    map.setView([allStores[idx].lat,allStores[idx].lng],13,{animate:true});
  }
}

// ── KPI CARD ──
function kpiCard(ico,lbl,last,prev,av,unit,gid,data){
  const d=delta(last,av);const dp=delta(last,prev);
  const dc=d>=0?'pos':'neg';const dpc=dp>=0?'pos':'neg';
  return`<div class="lkpi-card">
    <div class="lkpi-top"><span class="lkpi-ico">${ico}</span><span class="lkpi-lbl">${lbl}</span></div>
    <div class="lkpi-val">${nf(last)}<span style="font-size:11px;font-weight:600;color:#6B7280;margin-left:2px">${unit}</span></div>
    <div class="lkpi-sub">Dern. semaine</div>
    ${chartSVG(data,gid,BRAND)}
    <div class="lkpi-sep"></div>
    <div class="lkpi-row"><span class="lkpi-rl">vs moy.</span><span class="delta ${dc}">${d>=0?'+':''}${d}%</span></div>
    <div class="lkpi-row"><span class="lkpi-rl">vs préc.</span><span class="delta ${dpc}">${dp>=0?'+':''}${dp}%</span></div>
    <div class="lkpi-row"><span class="lkpi-rl">Moy.</span><span class="lkpi-rv">${nf(av)}</span></div>
  </div>`;}

// ── STORE PANEL ──
function selectStore(idx){
  const s=allStores[idx];
  setActiveMarker(idx);
  const rV=byVisits.findIndex(x=>x.idx===idx)+1;
  const rP=byProg.findIndex(x=>x.idx===idx)+1;
  document.getElementById('panel-content').innerHTML=`
    <div class="lhdr">
      <div class="lhdr-left">
        <div class="lhdr-logo"><img src="public/images/logos/Quick_logo.png" alt="Quick" style="height:36px" onerror="this.style.display='none'"></div>
        <div><div class="lhdr-name">${s.n}</div><div class="lhdr-addr">${s.a?s.a+' — ':''}<b>${s.cp} ${s.c}</b></div></div>
      </div>
      <div class="lhdr-right">
        <div class="lhdr-badge">🏆 #${rV} Visites</div>
        <div class="lhdr-meta">#${rP} progression</div>
      </div>
    </div>
    <div class="lsec"><div class="lsec-bar"></div>KPIs — dernière semaine</div>
    <div class="lkpi-grid">
      ${kpiCard('👣','Visites',s.lastV,s.prevV,s.avgV,'',`gv${idx}`,s.visits)}
      ${kpiCard('📞','Appels',s.lastC,s.prevC,s.avgC,'',`gc${idx}`,s.calls)}
      ${kpiCard('🗺️','Itinéraires',s.lastR,s.prevR,s.avgR,'',`gr${idx}`,s.routes)}
      ${kpiCard('🍔','Commandes',s.lastCmd,s.prevCmd,s.avgCmd,'',`gd${idx}`,s.commandes)}
    </div>`;
}

// ── GLOBAL RANKINGS ──
function setupGlobalRankings(){
  document.getElementById('global-title').innerHTML=`<div style="font-size:13px;font-weight:700;color:#0D1B4B">Classements — tous les restaurants</div>`;
  const top5V=byVisits.slice(0,5);
  const top5P=byProg.slice(0,5);
  function rankCard(title,items,valFn,labelFn){
    const rows=items.map((s,i)=>`
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F3F4F6;cursor:pointer" onclick="selectStore(${s.idx})">
        <span style="font-size:11px;font-weight:800;color:${RANK_COLORS[i]};width:16px;text-align:center">#${i+1}</span>
        <span style="flex:1;font-size:10px;color:#374151;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.n}</span>
        <span style="font-size:10px;font-weight:700;color:#0D1B4B">${valFn(s)}</span>
      </div>`).join('');
    return`<div style="background:#fff;border-radius:10px;padding:12px 14px;flex:1;box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="font-size:10px;font-weight:700;color:#4B5675;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${title}</div>
      ${rows}</div>`;}
  document.getElementById('global-row1').innerHTML=
    rankCard('Top visites',top5V,s=>nf(s.lastV))+
    rankCard('Top progression',top5P,s=>(s.vsPrevV>=0?'+':'')+s.vsPrevV+'%');

  // Evolution chart top 5 visites
  setupEvoChart(top5V);
}

function setupEvoChart(top5){
  const maxN=Math.max(...top5.map(s=>s.visits.length));
  const W=600,H=160,pL=32,pR=12,pT=10,pB=20;
  const iw=W-pL-pR,ih=H-pT-pB;
  const allVals=top5.flatMap(s=>s.visits);
  const mn=Math.min(...allVals),mx=Math.max(...allVals),rng=mx-mn||1;
  const x=i=>pL+i/(maxN-1)*iw;
  const y=v=>pT+(1-(v-mn)/rng)*ih;
  let paths='';
  top5.forEach((s,ci)=>{
    const n=s.visits.length;
    const offset=maxN-n;
    const pts=s.visits.map((v,i)=>`${x(offset+i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
    paths+=`<polyline points="${pts}" fill="none" stroke="${RANK_COLORS[ci]}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>`;
    const lx=x(maxN-1),ly=y(s.visits[n-1]);
    paths+=`<circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3.5" fill="${RANK_COLORS[ci]}" stroke="white" stroke-width="1.2"/>`;
  });
  const leg=top5.map((s,i)=>`<span class="leg"><svg width="12" height="3"><line x1="0" y1="1.5" x2="12" y2="1.5" stroke="${RANK_COLORS[i]}" stroke-width="2"/></svg>${s.n.substring(0,22)}</span>`).join('');
  document.getElementById('global-row2').innerHTML=`
    <div style="background:#fff;border-radius:10px;padding:12px 14px;flex:1;box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="font-size:10px;font-weight:700;color:#4B5675;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Évolution visites — Top 5</div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${paths}</svg>
      <div class="lchart-legend">${leg}</div>
    </div>`;}

setupGlobalRankings();
selectStore(byVisits[0].idx);
</script>
</body>
